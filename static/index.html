<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Session Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --color-bg:          #0c0e12;
  --color-surface:     #13161c;
  --color-surface-alt: #1a1e26;
  --color-border:      #252a35;
  --color-border-focus:#3a4252;

  --color-text:        #d4d8e0;
  --color-text-muted:  #6b7280;
  --color-text-dim:    #3e4550;

  --color-action:      #6ea1ff;
  --color-action-dim:  #6ea1ff22;

  --color-working:     #5b9aff;
  --color-working-bg:  #5b9aff18;
  --color-input:       #e5c07b;
  --color-input-bg:    #e5c07b15;
  --color-idle:        #6b7280;
  --color-idle-bg:     #6b728012;
  --color-completed:   #73daca;
  --color-completed-bg:#73daca15;
  --color-failed:      #f07178;
  --color-failed-bg:   #f0717815;
  --color-stopped:     #4a5060;
  --color-stopped-bg:  #4a506012;

  --color-danger:      #f07178;
  --color-danger-dim:  #f0717818;

  --radius:            6px;
  --radius-lg:         10px;
  --font-mono:         'JetBrains Mono', monospace;
  --font-sans:         'Space Grotesk', system-ui, sans-serif;
}

html{font-size:15px}
body{
  background:var(--color-bg);
  color:var(--color-text);
  font-family:var(--font-mono);
  line-height:1.5;
  min-height:100vh;
}

/* ── Header ── */
.header{
  padding:1.6rem 2rem 1.2rem;
  border-bottom:1px solid var(--color-border);
  display:flex;
  align-items:center;
  gap:.75rem;
}
.header-icon{
  font-size:1.4rem;
  color:var(--color-action);
  animation:spin-slow 8s linear infinite;
}
@keyframes spin-slow{to{transform:rotate(360deg)}}
.header h1{
  font-family:var(--font-sans);
  font-size:1.15rem;
  font-weight:600;
  letter-spacing:-.02em;
  color:var(--color-text);
}
.header-meta{
  margin-left:auto;
  font-size:.7rem;
  color:var(--color-text-muted);
  display:flex;
  align-items:center;
  gap:.5rem;
}
.pulse-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--color-completed);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Main layout ── */
.main{
  max-width:1100px;
  margin:0 auto;
  padding:1.5rem 1.5rem 4rem;
}

/* ── Create form ── */
.create-form{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:1.2rem 1.4rem;
  margin-bottom:1.5rem;
}
.form-row{
  display:flex;
  gap:.6rem;
  flex-wrap:wrap;
}
.form-field{flex:1;min-width:0}
.form-field.prompt-field{flex:3}
.form-field.small{flex:1}
.form-label{
  display:block;
  font-size:.65rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--color-text-muted);
  margin-bottom:.3rem;
}
.form-input{
  width:100%;
  background:var(--color-bg);
  border:1px solid var(--color-border);
  border-radius:var(--radius);
  color:var(--color-text);
  font-family:var(--font-mono);
  font-size:.8rem;
  padding:.55rem .7rem;
  transition:border-color .15s;
}
.form-input:focus{
  outline:none;
  border-color:var(--color-action);
  box-shadow:0 0 0 2px var(--color-action-dim);
}
.form-input::placeholder{color:var(--color-text-dim)}
.btn-create{
  align-self:flex-end;
  background:var(--color-action);
  color:var(--color-bg);
  border:none;
  border-radius:var(--radius);
  font-family:var(--font-mono);
  font-size:.75rem;
  font-weight:600;
  padding:.55rem 1.2rem;
  cursor:pointer;
  white-space:nowrap;
  transition:opacity .15s;
}
.btn-create:hover{opacity:.85}
.btn-create:disabled{opacity:.4;cursor:not-allowed}

/* ── Session table ── */
.session-table-wrap{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  overflow:hidden;
}
.session-table{
  width:100%;
  border-collapse:collapse;
  font-size:.78rem;
}
.session-table th{
  text-align:left;
  font-size:.6rem;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--color-text-muted);
  padding:.7rem 1rem;
  border-bottom:1px solid var(--color-border);
  background:var(--color-surface-alt);
}
.session-table td{
  padding:.65rem 1rem;
  border-bottom:1px solid var(--color-border);
  vertical-align:middle;
}
.session-table tbody tr:last-child td{border-bottom:none}
.session-table tbody tr{transition:background .1s}
.session-table tbody tr:hover{background:var(--color-surface-alt)}

.cell-id{
  font-weight:500;
  color:var(--color-action);
  font-size:.75rem;
}
.cell-name{
  color:var(--color-text);
  max-width:120px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.cell-prompt{
  color:var(--color-text-muted);
  max-width:220px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:.72rem;
}
.cell-cwd{
  color:var(--color-text-dim);
  font-size:.68rem;
  max-width:140px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.cell-time{
  color:var(--color-text-dim);
  font-size:.68rem;
  white-space:nowrap;
}

/* ── State badge ── */
.badge{
  display:inline-flex;
  align-items:center;
  gap:.35rem;
  padding:.15rem .55rem;
  border-radius:20px;
  font-size:.65rem;
  font-weight:500;
  letter-spacing:.02em;
  white-space:nowrap;
}
.badge::before{
  content:'';
  width:5px;height:5px;
  border-radius:50%;
  flex-shrink:0;
}
.badge-working{color:var(--color-working);background:var(--color-working-bg)}
.badge-working::before{background:var(--color-working);animation:pulse 1.5s ease-in-out infinite}
.badge-needs_input{color:var(--color-input);background:var(--color-input-bg)}
.badge-needs_input::before{background:var(--color-input);animation:pulse 1s ease-in-out infinite}
.badge-idle{color:var(--color-idle);background:var(--color-idle-bg)}
.badge-idle::before{background:var(--color-idle)}
.badge-completed{color:var(--color-completed);background:var(--color-completed-bg)}
.badge-completed::before{background:var(--color-completed)}
.badge-failed{color:var(--color-failed);background:var(--color-failed-bg)}
.badge-failed::before{background:var(--color-failed)}
.badge-stopped{color:var(--color-stopped);background:var(--color-stopped-bg)}
.badge-stopped::before{background:var(--color-stopped)}
.badge-unknown{color:var(--color-text-dim);background:var(--color-stopped-bg)}
.badge-unknown::before{background:var(--color-text-dim)}

/* ── Action buttons ── */
.actions{display:flex;gap:.3rem;flex-wrap:wrap}
.btn-action{
  background:var(--color-surface-alt);
  border:1px solid var(--color-border);
  border-radius:var(--radius);
  color:var(--color-text-muted);
  font-family:var(--font-mono);
  font-size:.62rem;
  padding:.25rem .5rem;
  cursor:pointer;
  transition:all .12s;
  white-space:nowrap;
}
.btn-action:hover{
  border-color:var(--color-border-focus);
  color:var(--color-text);
  background:var(--color-border);
}
.btn-action.danger:hover{
  border-color:var(--color-danger);
  color:var(--color-danger);
  background:var(--color-danger-dim);
}
.btn-action.rc-link{
  color:var(--color-action);
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:.2rem;
}
.btn-action.rc-link:hover{border-color:var(--color-action)}

/* ── Empty state ── */
.empty-state{
  text-align:center;
  padding:3rem 1rem;
  color:var(--color-text-dim);
  font-size:.85rem;
}
.empty-state-icon{font-size:2rem;margin-bottom:.5rem;opacity:.3}

/* ── Logs modal ── */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
  padding:1rem;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  width:100%;
  max-width:760px;
  max-height:80vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.8rem 1.2rem;
  border-bottom:1px solid var(--color-border);
  background:var(--color-surface-alt);
}
.modal-title{
  font-size:.8rem;
  font-weight:500;
  color:var(--color-text);
}
.btn-close{
  background:none;
  border:none;
  color:var(--color-text-muted);
  font-size:1.1rem;
  cursor:pointer;
  padding:.2rem;
  line-height:1;
}
.btn-close:hover{color:var(--color-text)}
.modal-body{
  padding:1rem 1.2rem;
  overflow-y:auto;
  flex:1;
}
.logs-content{
  font-family:var(--font-mono);
  font-size:.72rem;
  color:var(--color-text-muted);
  white-space:pre-wrap;
  word-break:break-all;
  line-height:1.65;
}
.logs-loading{color:var(--color-text-dim);font-style:italic}

/* ── Toast ── */
.toast-container{
  position:fixed;
  bottom:1.5rem;
  right:1.5rem;
  z-index:200;
  display:flex;
  flex-direction:column;
  gap:.5rem;
}
.toast{
  background:var(--color-surface-alt);
  border:1px solid var(--color-border);
  border-radius:var(--radius);
  padding:.5rem 1rem;
  font-size:.72rem;
  color:var(--color-text);
  animation:toast-in .25s ease-out;
  max-width:320px;
}
.toast.error{border-color:var(--color-danger);color:var(--color-danger)}
@keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Responsive ── */
@media(max-width:768px){
  .header{padding:1rem}
  .main{padding:1rem .8rem 3rem}
  .form-row{flex-direction:column}
  .form-field.small{flex:none}

  .session-table-wrap{overflow-x:auto}
  .session-table{min-width:700px}

  .modal{max-width:100%;max-height:90vh}
}
</style>
</head>
<body>

<header class="header">
  <span class="header-icon">✻</span>
  <h1>Claude Session Manager</h1>
  <div class="header-meta">
    <span class="pulse-dot"></span>
    <span id="session-count">0 sessions</span>
  </div>
</header>

<main class="main">
  <form class="create-form" id="create-form">
    <div class="form-row">
      <div class="form-field prompt-field">
        <label class="form-label" for="prompt">Prompt</label>
        <input class="form-input" id="prompt" type="text" placeholder="Describe the task…" required>
      </div>
      <div class="form-field small">
        <label class="form-label" for="name">Name</label>
        <input class="form-input" id="name" type="text" placeholder="optional">
      </div>
      <div class="form-field small">
        <label class="form-label" for="cwd">Working Dir</label>
        <input class="form-input" id="cwd" type="text" placeholder="optional">
      </div>
      <button class="btn-create" type="submit" id="btn-submit">Launch</button>
    </div>
  </form>

  <div class="session-table-wrap">
    <table class="session-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>State</th>
          <th>Prompt</th>
          <th>Directory</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="session-tbody">
        <tr>
          <td colspan="7">
            <div class="empty-state">
              <div class="empty-state-icon">∙</div>
              Loading sessions…
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<div class="modal-overlay" id="logs-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="logs-title">Session Logs</span>
      <button class="btn-close" id="btn-close-logs">&times;</button>
    </div>
    <div class="modal-body">
      <pre class="logs-content" id="logs-content"><span class="logs-loading">Loading…</span></pre>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const API = '/api';
const tbody = document.getElementById('session-tbody');
const form = document.getElementById('create-form');
const btnSubmit = document.getElementById('btn-submit');
const logsModal = document.getElementById('logs-modal');
const logsTitle = document.getElementById('logs-title');
const logsContent = document.getElementById('logs-content');
const sessionCount = document.getElementById('session-count');
const toastContainer = document.getElementById('toast-container');

function toast(msg, isError = false) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  toastContainer.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function shortPath(p) {
  if (!p) return '—';
  const home = '/home/';
  const idx = p.indexOf(home);
  if (idx >= 0) {
    const rest = p.slice(idx + home.length);
    const slash = rest.indexOf('/');
    return slash >= 0 ? '~/' + rest.slice(slash + 1) : '~';
  }
  return p;
}

function relativeTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function renderSessions(sessions) {
  const count = sessions.length;
  sessionCount.textContent = count + ' session' + (count !== 1 ? 's' : '');

  if (count === 0) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty-state">
        <div class="empty-state-icon">∙</div>
        No active sessions. Launch one above.
      </div>
    </td></tr>`;
    return;
  }

  const stateOrder = { working: 0, needs_input: 1, idle: 2, completed: 3, failed: 4, stopped: 5, unknown: 6 };
  sessions.sort((a, b) => (stateOrder[a.state] ?? 6) - (stateOrder[b.state] ?? 6));

  tbody.innerHTML = sessions.map(s => {
    const stateLabel = s.state === 'needs_input' ? 'input' : s.state;
    const rcUrl = s.remote_control_url || null;
    const canStop = ['working', 'needs_input', 'idle'].includes(s.state);
    const canRespawn = ['stopped', 'completed', 'failed'].includes(s.state);
    const canRemove = ['stopped', 'completed', 'failed'].includes(s.state);

    return `<tr>
      <td><span class="cell-id">${s.short_id}</span></td>
      <td><span class="cell-name">${s.name || '—'}</span></td>
      <td><span class="badge badge-${s.state}">${stateLabel}</span></td>
      <td><span class="cell-prompt" title="${(s.prompt || '').replace(/"/g, '&quot;')}">${s.prompt || '—'}</span></td>
      <td><span class="cell-cwd" title="${s.cwd || ''}">${shortPath(s.cwd)}</span></td>
      <td><span class="cell-time" title="${s.created_at || ''}">${relativeTime(s.created_at)}</span></td>
      <td>
        <div class="actions">
          <button class="btn-action" onclick="viewLogs('${s.short_id}')">logs</button>
          ${canStop ? `<button class="btn-action" onclick="stopSession('${s.short_id}')">stop</button>` : ''}
          ${canRespawn ? `<button class="btn-action" onclick="respawnSession('${s.short_id}')">respawn</button>` : ''}
          ${canRemove ? `<button class="btn-action danger" onclick="removeSession('${s.short_id}')">rm</button>` : ''}
          ${rcUrl ? `<a class="btn-action rc-link" href="${rcUrl}" target="_blank" rel="noopener">RC ↗</a>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function fetchSessions() {
  try {
    const res = await fetch(API + '/sessions');
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    renderSessions(data);
  } catch (e) {
    console.error('Failed to fetch sessions:', e);
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;

  const name = document.getElementById('name').value.trim() || undefined;
  const cwd = document.getElementById('cwd').value.trim() || undefined;

  btnSubmit.disabled = true;
  btnSubmit.textContent = 'Launching…';

  try {
    const res = await fetch(API + '/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, name, cwd }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || res.statusText);
    }
    const session = await res.json();
    toast(`Session ${session.short_id} launched`);
    document.getElementById('prompt').value = '';
    document.getElementById('name').value = '';
    document.getElementById('cwd').value = '';
    fetchSessions();
  } catch (e) {
    toast('Launch failed: ' + e.message, true);
  } finally {
    btnSubmit.disabled = false;
    btnSubmit.textContent = 'Launch';
  }
});

async function viewLogs(id) {
  logsTitle.textContent = `Logs — ${id}`;
  logsContent.innerHTML = '<span class="logs-loading">Loading…</span>';
  logsModal.classList.add('active');

  try {
    const res = await fetch(API + `/sessions/${id}/logs`);
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    logsContent.textContent = data.logs || '(no output)';
  } catch (e) {
    logsContent.textContent = 'Error loading logs: ' + e.message;
  }
}

document.getElementById('btn-close-logs').addEventListener('click', () => {
  logsModal.classList.remove('active');
});
logsModal.addEventListener('click', (e) => {
  if (e.target === logsModal) logsModal.classList.remove('active');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') logsModal.classList.remove('active');
});

async function stopSession(id) {
  try {
    const res = await fetch(API + `/sessions/${id}/stop`, { method: 'POST' });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || res.statusText);
    toast(`Session ${id} stopped`);
    fetchSessions();
  } catch (e) {
    toast('Stop failed: ' + e.message, true);
  }
}

async function respawnSession(id) {
  try {
    const res = await fetch(API + `/sessions/${id}/respawn`, { method: 'POST' });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || res.statusText);
    toast(`Session ${id} respawned`);
    fetchSessions();
  } catch (e) {
    toast('Respawn failed: ' + e.message, true);
  }
}

async function removeSession(id) {
  if (!confirm(`Remove session ${id}? This cannot be undone.`)) return;
  try {
    const res = await fetch(API + `/sessions/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || res.statusText);
    toast(`Session ${id} removed`);
    fetchSessions();
  } catch (e) {
    toast('Remove failed: ' + e.message, true);
  }
}

// Auto-refresh
fetchSessions();
setInterval(fetchSessions, 3000);
</script>
</body>
</html>
