# Claude Session Manager configuration
# Copy this file to csm.config.toml and edit as needed.
# csm.config.toml is gitignored — your local settings stay private.

[server]
host = "0.0.0.0"
port = 8321

# Operating mode:
#   "standalone" — single node, no remote aggregation (default)
#   "host"       — aggregates sessions from remote CSM nodes
#   "client"     — serves local sessions only (no remote aggregation)
# mode = "standalone"

[paths]
# Path to tmux binary (auto-detected from $PATH if omitted)
# tmux = "/usr/bin/tmux"

# Path to claude binary (auto-detected from $PATH if omitted)
# claude = "/usr/local/bin/claude"

# Claude config directory (defaults to ~/.claude)
# claude_config_dir = "~/.claude"

[session]
# Flags passed to every `claude` invocation
dangerously_skip_permissions = true

[lifecycle]
# Auto-archive a stopped session this many days after its last jsonl activity.
# archive_after_days = 7

# Same, but for sessions created by a schedule (typically shorter to limit clutter).
# archive_after_days_scheduled = 3

# How often the archive sweep runs.
# cleanup_interval_minutes = 60

# Auto-stop (kill the claude process) a session that has been sitting in the
# "waiting" state — i.e. idle, awaiting user input — for this many minutes.
# The next message to such a session transparently `claude --resume`s it.
# Set to 0 to disable idle auto-stop entirely.
# idle_timeout_minutes = 60

# How often the idle sweep runs.
# idle_check_interval_minutes = 5

# ─── Multi-node configuration (host mode only) ──────────────────────────────
# Add [[remotes]] entries for each CSM node to aggregate.
# Each node must be running CSM and accessible from this host.
#
# [[remotes]]
# name = "lab-server"
# url = "http://192.168.1.10:8321"
#
# [[remotes]]
# name = "dev-machine"
# url = "http://192.168.1.20:8321"
